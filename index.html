<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Design Inteligente - Canecas 3D & Agente IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,300;0,500;0,700;1,900&family=Cinzel:wght@700&family=Permanent+Marker&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { gotham: { dark: '#0B0C10', card: '#151B24', yellow: '#FFD700', accent: '#4E9F3D', ai: '#8B5CF6', light: '#C5C6C7' } } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #0B0C10; font-family: 'Montserrat', sans-serif; color: #C5C6C7; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 3px; }
        .ai-glow { box-shadow: 0 0 15px rgba(139, 92, 246, 0.25); }
        .ai-glow-border:focus { border-color: rgba(139, 92, 246, 0.9); box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden flex flex-col bg-gotham-dark relative">

    <div id="loginScreen" class="fixed inset-0 bg-gotham-dark z-[100] flex items-center justify-center p-4">
        <div class="bg-gotham-card border border-white/10 rounded-3xl p-8 max-w-md w-full shadow-2xl flex flex-col gap-6 relative">
            <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-violet-600 to-indigo-600"></div>
            <div class="flex flex-col items-center text-center gap-2 mt-2">
                <div class="w-16 h-16 bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl flex items-center justify-center mb-2"><i class="fa-solid fa-mug-hot text-3xl text-white"></i></div>
                <h1 class="text-2xl font-black text-white tracking-widest">MUGSTUDIO <span class="text-violet-400">IA</span></h1>
            </div>
            <div id="loginError" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 text-xs p-3 rounded-xl text-center font-mono"></div>
            <div class="flex flex-col gap-4">
                <input type="email" id="emailInput" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white" placeholder="designer@estudio.com">
                <input type="password" id="passwordInput" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white" placeholder="••••••••">
            </div>
            <div class="flex gap-3 mt-2">
                <button id="btnLogin" class="flex-1 bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl text-sm">Entrar</button>
                <button id="btnRegister" class="flex-1 bg-transparent border border-white/20 hover:border-violet-500 text-gray-300 font-bold py-3 rounded-xl text-sm">Criar Conta</button>
            </div>
            <button id="btnGoogle" class="w-full bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 px-4 rounded-xl text-sm flex items-center justify-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" class="w-5 h-5"> Continuar com o Google
            </button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex-col">
        <header class="border-b border-white/5 bg-black/85 backdrop-blur-md px-6 py-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold text-white">MUGSTUDIO <span class="text-violet-400">GEN-IA</span></h1>
                <div id="userProfileArea" class="flex items-center gap-3">
                    <p id="userNameDisplay" class="text-xs font-bold text-white"></p>
                    <button id="btnLogout" class="bg-red-500/10 text-red-400 px-3 py-1.5 rounded-lg border border-red-500/30 text-xs">Sair</button>
                </div>
            </div>
        </header>
        <main class="max-w-7xl mx-auto p-6 w-full flex-grow text-center py-20 text-white">
            <h2 class="text-4xl font-black mb-4">Bem-vindo ao Estúdio</h2>
            <p class="text-gray-400">O painel está ativo e funcional.</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkCNidkLchtEnaL2COYQ2x8NwpKivFM_M",
            authDomain: "sdutio-canecas.firebaseapp.com",
            projectId: "sdutio-canecas",
            storageBucket: "sdutio-canecas.appspot.com",
            messagingSenderId: "556904542035",
            appId: "1:556904542035:web:56a248ed65ec3c5d37bba6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const btnLogout = document.getElementById('btnLogout');

        // Logout com limpeza forçada
        btnLogout.addEventListener('click', () => {
            signOut(auth).then(() => {
                // FORÇANDO LIMPEZA: Pegando pelo ID diretamente no DOM
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
                // Limpeza extra para prevenir autocomplete persistente
                emailInput.value = '';
                passwordInput.value = '';
            });
        });

        document.getElementById('btnLogin').addEventListener('click', () => signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(e => alert(e.message)));
        document.getElementById('btnRegister').addEventListener('click', () => createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(e => alert(e.message)));
        document.getElementById('btnGoogle').addEventListener('click', () => signInWithPopup(auth, googleProvider).catch(e => console.error(e)));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                mainApp.classList.add('flex');
                document.getElementById('userNameDisplay').innerText = user.email;
            } else {
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
                mainApp.classList.remove('flex');
                // Limpeza agressiva ao sair
                emailInput.value = '';
                passwordInput.value = '';
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
            }
        });
    </script>
</body>
</html>
