<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <!-- STREAMING_CHUNK:Configurando assets... -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Design Inteligente - Canecas 3D & Agente IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500;700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #0B0C10; font-family: 'Montserrat', sans-serif; color: #C5C6C7; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-[#0B0C10]">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0B0C10] flex items-center justify-center p-4">
        <div class="bg-[#151B24] w-full max-w-md rounded-3xl border border-violet-500/30 p-8 flex flex-col gap-6 shadow-2xl">
            <h1 class="text-2xl font-black text-white text-center tracking-widest">MUGSTUDIO <span class="text-violet-400">IA</span></h1>
            <input type="email" id="emailInput" autocomplete="off" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white" placeholder="Email Profissional">
            <input type="password" id="passwordInput" autocomplete="new-password" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white" placeholder="Senha">
            <button id="btnLogin" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl text-sm">Entrar</button>
            <button id="btnGoogle" class="w-full bg-white text-gray-900 font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2">Continuar com o Google</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden flex-col min-h-screen">
        <header class="border-b border-white/5 bg-black/85 backdrop-blur-md px-6 py-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center text-white">
                <h1 class="font-bold">MUGSTUDIO <span class="text-violet-400">GEN-IA</span></h1>
                <button id="btnLogout" class="text-xs bg-red-900/20 text-red-400 px-3 py-1 rounded-full border border-red-900">Sair</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div id="canvasContainer" class="w-full h-[500px] bg-black/50 rounded-3xl border border-white/10 shadow-xl overflow-hidden"></div>
            <div class="flex flex-col gap-6 text-white">
                <textarea id="aiPrompt" rows="3" class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-white" placeholder="Descreva a arte..."></textarea>
                <button id="btnGenerate" class="bg-violet-600 hover:bg-violet-700 text-white py-4 rounded-xl font-bold">Gerar Arte 3D</button>
            </div>
        </main>
    </div>

    <!-- STREAMING_CHUNK:Lógica unificada de Login, IA e 3D... -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkCNidkLchtEnaL2COYQ2x8NwpKivFM_M",
            authDomain: "sdutio-canecas.firebaseapp.com",
            projectId: "sdutio-canecas",
            storageBucket: "sdutio-canecas.appspot.com",
            messagingSenderId: "556904542035",
            appId: "1:556904542035:web:56a248ed65ec3c5d37bba6"
        };

        const auth = getAuth(initializeApp(firebaseConfig));
        const provider = new GoogleAuthProvider();
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        
        let scene, camera, renderer, mugGroup;

        // Limpeza anti-autofill
        function forceClearInputs() {
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                mainApp.classList.add('flex');
                setTimeout(initThreeJS, 500); 
            } else {
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
                mainApp.classList.remove('flex');
                forceClearInputs();
            }
        });

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value).catch(e => alert(e.message));
        });

        document.getElementById('btnGoogle').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        function initThreeJS() {
            const container = document.getElementById('canvasContainer');
            if (container.innerHTML !== "") return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            const geometry = new THREE.CylinderGeometry(1.5, 1.5, 3, 32);
            const material = new THREE.MeshPhongMaterial({ color: 0x8b5cf6 });
            mugGroup = new THREE.Mesh(geometry, material);
            scene.add(mugGroup);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 5;
            new THREE.OrbitControls(camera, renderer.domElement);
            
            function animate() { requestAnimationFrame(animate); mugGroup.rotation.y += 0.01; renderer.render(scene, camera); }
            animate();
        }

        document.getElementById('btnGenerate').addEventListener('click', () => {
            const prompt = document.getElementById('aiPrompt').value;
            alert("Gerando IA: " + prompt);
            // Aqui vai a sua lógica de IA
        });
    </script>
</body>
</html>
