<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MugStudio IA - Estúdio Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #0B0C10; color: #C5C6C7; font-family: sans-serif; }
    </style>
</head>
<body>

    <!-- ECRÃ DE LOGIN -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0B0C10] flex items-center justify-center p-4">
        <div class="bg-[#151B24] border border-white/10 p-8 rounded-3xl w-full max-w-sm flex flex-col gap-4">
            <h1 class="text-2xl font-bold text-white text-center mb-4">LOGIN MUGSTUDIO</h1>
            <input type="email" id="emailInput" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white" placeholder="Email">
            <input type="password" id="passwordInput" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white" placeholder="Senha">
            <button id="btnLogin" class="bg-violet-600 text-white font-bold py-3 rounded-xl">Entrar</button>
            <button id="btnGoogle" class="bg-white text-black font-bold py-3 rounded-xl">Entrar com Google</button>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div id="mainApp" class="hidden flex-col h-screen">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <h1 class="font-bold text-white">MUGSTUDIO IA</h1>
            <button id="btnLogout" class="bg-red-900/20 text-red-400 px-4 py-2 rounded-full text-xs">Sair</button>
        </header>
        <main class="flex-grow p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="canvasContainer" class="w-full h-[500px] bg-black/30 rounded-3xl overflow-hidden border border-white/5"></div>
            <div class="flex flex-col gap-4">
                <textarea id="aiPrompt" class="w-full h-32 bg-black/30 border border-white/5 rounded-2xl p-4 text-white" placeholder="Descreva a arte da caneca..."></textarea>
                <button id="btnGenerate" class="bg-violet-600 text-white font-bold py-4 rounded-xl">Gerar Arte com IA</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const auth = getAuth(initializeApp({
              apiKey: "AIzaSyDj7fEJUxeJydEvheKcatILaJftdXczfNM",
  authDomain: "canecas-studio.firebaseapp.com",
  projectId: "canecas-studio",
  storageBucket: "canecas-studio.firebasestorage.app",
  messagingSenderId: "330449874900",
            appId: "1:556904542035:web:56a248ed65ec3c5d37bba6"
        }));

        const provider = new GoogleAuthProvider();
        let scene, camera, renderer, mug;

        // Observer para garantir que o 3D redimensiona assim que o mainApp aparecer
        const observer = new MutationObserver(() => {
            if (!document.getElementById('mainApp').classList.contains('hidden')) {
                window.dispatchEvent(new Event('resize'));
            }
        });
        observer.observe(document.getElementById('mainApp'), { attributes: true, attributeFilter: ['class'] });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('flex');
                initThreeJS();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        document.getElementById('btnLogin').addEventListener('click', () => signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value));
        document.getElementById('btnGoogle').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        function initThreeJS() {
            const container = document.getElementById('canvasContainer');
            if (container.querySelector('canvas')) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            const geometry = new THREE.CylinderGeometry(1.2, 1.2, 2.5, 64);
            const material = new THREE.MeshPhongMaterial({ color: 0x8b5cf6, shininess: 100 });
            mug = new THREE.Mesh(geometry, material);
            scene.add(mug);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            camera.position.z = 4;
            new THREE.OrbitControls(camera, renderer.domElement);
            
            function animate() { requestAnimationFrame(animate); mug.rotation.y += 0.01; renderer.render(scene, camera); }
            animate();
        }
    </script>
</body>
</html>
