<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Design Inteligente - Canecas 3D & Agente IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500;700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #0B0C10; font-family: 'Montserrat', sans-serif; color: #C5C6C7; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-[#0B0C10]">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="fixed inset-0 bg-[#0B0C10] z-[100] flex items-center justify-center p-4">
        <div class="bg-[#151B24] border border-white/10 rounded-3xl p-8 max-w-md w-full shadow-2xl flex flex-col gap-6">
            <h1 class="text-2xl font-black text-white text-center tracking-widest">MUGSTUDIO <span class="text-violet-400">IA</span></h1>
            <div id="loginError" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 text-xs p-3 rounded-xl text-center"></div>
            <input type="email" id="emailInput" autocomplete="off" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white" placeholder="Email Profissional">
            <input type="password" id="passwordInput" autocomplete="new-password" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white" placeholder="Senha">
            <div class="flex gap-3">
                <button id="btnLogin" class="flex-1 bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl text-sm">Entrar</button>
                <button id="btnRegister" class="flex-1 bg-transparent border border-white/20 hover:border-violet-500 text-gray-300 font-bold py-3 rounded-xl text-sm">Criar Conta</button>
            </div>
            <button id="btnGoogle" class="w-full bg-white text-gray-900 font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" class="w-5 h-5"> Continuar com o Google
            </button>
        </div>
    </div>

    <!-- PAINEL DO ESTÚDIO (SÓ APARECE LOGADO) -->
    <div id="mainApp" class="hidden flex-col min-h-screen">
        <header class="border-b border-white/5 bg-black/85 backdrop-blur-md px-6 py-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold text-white">MUGSTUDIO <span class="text-violet-400">GEN-IA</span></h1>
                <button id="btnLogout" class="text-xs bg-red-900/20 text-red-400 px-3 py-1 rounded-full border border-red-900">Sair da Conta</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div id="canvasContainer" class="w-full h-[500px] bg-black/50 rounded-3xl border border-white/10 shadow-xl"></div>
            <div class="flex flex-col gap-6">
                <textarea id="aiPrompt" rows="3" class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-white" placeholder="Descreva a arte profissional (ex: Neymar jogando futebol, ultra realista, 8k)..."></textarea>
                <button id="btnGenerate" class="bg-violet-600 hover:bg-violet-700 text-white py-4 rounded-xl font-bold">Gerar Arte com IA Pro</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkCNidkLchtEnaL2COYQ2x8NwpKivFM_M",
            authDomain: "sdutio-canecas.firebaseapp.com",
            projectId: "sdutio-canecas",
            storageBucket: "sdutio-canecas.appspot.com",
            messagingSenderId: "556904542035",
            appId: "1:556904542035:web:56a248ed65ec3c5d37bba6"
        };

        const auth = getAuth(initializeApp(firebaseConfig));
        const provider = new GoogleAuthProvider();
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');

        function forceClearInputs() {
            emailInput.value = '';
            passwordInput.value = '';
            setTimeout(() => { emailInput.value = ''; passwordInput.value = ''; }, 100);
            setTimeout(() => { emailInput.value = ''; passwordInput.value = ''; }, 500);
        }

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(e => {
                document.getElementById('loginError').innerText = e.message;
                document.getElementById('loginError').classList.remove('hidden');
            });
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth);
        });

        document.getElementById('btnGoogle').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(e => {
                document.getElementById('loginError').innerText = "Erro: " + e.message;
                document.getElementById('loginError').classList.remove('hidden');
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                mainApp.classList.add('flex');
                initThreeJS(); // Inicia o 3D só depois do login
            } else {
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
                forceClearInputs();
            }
        });

        function initThreeJS() {
            const container = document.getElementById('canvasContainer');
            if (!container.innerHTML) {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);
                
                const geometry = new THREE.CylinderGeometry(1, 1, 3, 32);
                const material = new THREE.MeshBasicMaterial({ color: 0x8b5cf6 });
                const cylinder = new THREE.Mesh(geometry, material);
                scene.add(cylinder);
                camera.position.z = 5;
                
                function animate() { requestAnimationFrame(animate); cylinder.rotation.y += 0.01; renderer.render(scene, camera); }
                animate();
            }
        }
    </script>
</body>
</html>
